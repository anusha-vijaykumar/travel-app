server:
  port: 8083
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: inventory-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/inventories/**
        - id: booking-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/bookings/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**
  zipkin:
    base-url: http://localhost:9411
  # Using in-memory rate limiter for gateway (no external Redis required)
  # redis: # kept for backward compatibility if needed
  #  host: localhost
  #  port: 6379

eureka:
  instance:
    appname: api-gateway
    hostname: localhost
    preferIpAddress: false
    leaseRenewalIntervalInSeconds: 10
    leaseExpirationDurationInSeconds: 30
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
    instance-info-replication-interval-seconds: 10
  fetch-timeout-ms: 5000


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

