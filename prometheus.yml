global:
  scrape_interval: 15s

scrape_configs:
  - job_name: travel-app-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - localhost:8081
          - localhost:8082
          - localhost:8083
          - localhost:8084
          - localhost:8085
          - localhost:8086
          - localhost:8761
